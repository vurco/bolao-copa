<!DOCTYPE html>
<html>
    <head>
        <title>Bolao Copa 2026</title>
    </head>
    <body>
        <main>
            <h1>Palpites - Fase de Grupos</h1>

            <form id="form-palpites">
                <fieldset>
                    <legend>Grupo A: México, África do Sul, Coréia do Sul, A Definir</legend>

                    <label>México x África do Sul</label>
                    <input type="number" placeholder="Gols México">
                    <input type="number" placeholder="Gols África do Sul">

                    <label>Córeia do Sul x A Definir</label>
                    <input type="number" placeholder="Gols Córeia do Sul">
                    <input type="number" placeholder="Gols A Definir">

                    <label>México x Córeia do Sul</label>
                    <input type="number" placeholder="Gols México">
                    <input type="number" placeholder="Gols Córeia do Sul">

                    <label>África do Sul x A Definir</label>
                    <input type="number" placeholder="Gols África do Sul">
                    <input type="number" placeholder="Gols A Definir">

                    <label>México x A Definir</label>
                    <input type="number" placeholder="Gols México">
                    <input type="number" placeholder="Gols A Definir">

                    <label>África do Sul x Córeia do Sul</label>
                    <input type="number" placeholder="Gols África do Sul">
                    <input type="number" placeholder="Gols Córeia do Sul">
                                       
                </fieldset>

                <fieldset>
                    <legend>Grupo B: Canadá, Suíça, Catar, A definir</legend>

                    <label>Canadá x A definir</label>
                    <input type="number" placeholder="Gols Canadá">
                    <input type="number" placeholder="Gols A definir">

                    <label>Catar x Suíça</label>
                    <input type="number" placeholder="Gols Catar">
                    <input type="number" placeholder="Gols Suíça">

                    <label>Canadá x Catar</label>
                    <input type="number" placeholder="Gols Canadá">
                    <input type="number" placeholder="Gols Catar">

                    <label>Suíça x A Definir</label>
                    <input type="number" placeholder="Gols Suíça">
                    <input type="number" placeholder="Gols A Definir">

                    <label>Suíça x Canadá</label>
                    <input type="number" placeholder="Gols Suíça">
                    <input type="number" placeholder="Gols Canadá">

                    <label>A definir x Catar</label>
                    <input type="number" placeholder="Gols A definir">
                    <input type="number" placeholder="Gols Catar">
                                       
                </fieldset>   
                
                <fieldset>
                    <legend>Grupo C: Brasil, Marrocos, Haiti, Escócia</legend>

                    <label>Brasil x Marrocos</label>
                    <input type="number" placeholder="Gols Brasil">
                    <input type="number" placeholder="Gols Marrocos">

                    <label>Haiti x Escócia</label>
                    <input type="number" placeholder="Gols Haiti">
                    <input type="number" placeholder="Gols Escócia">

                    <label>Escócia x Marrocos</label>
                    <input type="number" placeholder="Gols Escócia">
                    <input type="number" placeholder="Gols Marrocos">

                    <label>Brasil x Haiti</label>
                    <input type="number" placeholder="Gols Brasil">
                    <input type="number" placeholder="Gols Haiti">

                    <label>Escócia x Brasil</label>
                    <input type="number" placeholder="Gols Escócia">
                    <input type="number" placeholder="Gols Brasil">

                    <label>Marrocos x Haiti</label>
                    <input type="number" placeholder="Gols Marrocos">
                    <input type="number" placeholder="Gols Haiti">
                                       
                </fieldset>    
                
                <fieldset>
                    <legend>Grupo D: EUA, Paraguai, Austrália, A definir</legend>

                    <label>EUA x Paraguai</label>
                    <input type="number" placeholder="Gols EUA">
                    <input type="number" placeholder="Gols Paraguai">

                    <label>Austrália x A definir</label>
                    <input type="number" placeholder="Gols Austrália">
                    <input type="number" placeholder="Gols A definir">

                    <label>A definir x Paraguai</label>
                    <input type="number" placeholder="Gols A definir">
                    <input type="number" placeholder="Gols Paraguai">

                    <label>EUA x Austrália</label>
                    <input type="number" placeholder="Gols EUA">
                    <input type="number" placeholder="Gols Austrália">

                    <label>A definir x EUA</label>
                    <input type="number" placeholder="Gols A definir">
                    <input type="number" placeholder="Gols EUA">

                    <label>Paraguai x Austrália</label>
                    <input type="number" placeholder="Gols Paraguai">
                    <input type="number" placeholder="Gols Austrália">
                                       
                </fieldset>    
                
                <fieldset>
                    <legend>Grupo E: Alemanha, Curaçao, Costa do Marfim, Equador</legend>

                    <label>Alemanha x Curaçao</label>
                    <input type="number" placeholder="Gols Alemanha">
                    <input type="number" placeholder="Gols Curaçao">

                    <label>Costa do Marfim x Equador</label>
                    <input type="number" placeholder="Gols Costa do Marfim">
                    <input type="number" placeholder="Gols Equador">

                    <label>Alemanha x Costa do Marfim</label>
                    <input type="number" placeholder="Gols Alemanha">
                    <input type="number" placeholder="Gols Costa do Marfim">

                    <label>Equador x Curaçao</label>
                    <input type="number" placeholder="Gols Equador">
                    <input type="number" placeholder="Gols Curaçao">

                    <label>Equador x Alemanha</label>
                    <input type="number" placeholder="Gols Equador">
                    <input type="number" placeholder="Gols Alemanha">

                    <label>Curaçao x Costa do Marfim</label>
                    <input type="number" placeholder="Gols Curaçao">
                    <input type="number" placeholder="Gols Costa do Marfim">
                                       
                </fieldset>                 
                <button type="submit">Salvar Palpites</button>
            </form>
            
        </main>

        
        
    <footer>By Vurco</footer>
    </body>
    
</html>
