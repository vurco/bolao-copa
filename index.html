<!DOCTYPE html>
<html>
    <head>
        <title>Bolao Copa 2026</title>
    </head>
    <body>
        <main>
            <h1>Bolao dos amigos</h1>
            <h2>Grupo A</h2>
            <ul>
                <li>Brasil</li>
                <li>Lituania</li>
                <li>Belgica</li>
                <li>Paraguai</li>
            </ul>
            <p>Seleciona os bagulho e <strong>sucesso</strong></p>

            <button id="ver-ranking">Ver Ranking</button>

            <script>
                document.getElementById("ver-ranking").onclick = function() {
                alert("Ranking em breve!");
                }
            </script>

            <h2>Seus Palpites - Fase de Grupos</h2>

                <form>
                    <fieldset>
                        <legend>Grupo A</legend>

                        <label>Brasil x Lituania</label>
                        <input type="number" placeholder="Gols Brasil" min="0">
                        <input type="number" placeholder="Gols Lituania" min="0">

                       <br><br>

                       <label>Belgica x Paraguai</label>
                       <input type="number" placeholder="Gols Belgica" min="0">
                        <input type="number" placeholder="Gols Paraguai" min="0">
                 </fieldset>
                </form>

        </main>

        
        

    </body>
</html>
